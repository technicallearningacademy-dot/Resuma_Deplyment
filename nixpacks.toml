# Nixpacks configuration for Railway
# Adds system-level dependencies needed by PyMuPDF and pdf2docx

[phases.setup]
nixPkgs = ["...", "gcc", "musl-dev", "libffi-dev", "mupdf"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
    "python manage.py migrate --noinput"
]

[start]
cmd = "gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
