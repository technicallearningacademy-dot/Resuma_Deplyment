{% extends 'base.html' %}
{% block title %}Create Resume{% endblock %}

{% block content %}
<div class="min-h-screen py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
    <div class="w-full max-w-6xl animate-slide-up">

        <div class="text-center mb-10">
            <h1
                class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-accent-400 mb-3 tracking-tight">
                Create Your Resume</h1>
            <p class="text-dark-400 text-lg max-w-xl mx-auto">Select a professionally designed base template. You can
                always change your template later without losing any content.</p>
        </div>

        <form method="post" class="space-y-8">
            {% csrf_token %}

            <div
                class="card p-6 bg-dark-800/80 border-dark-600/50 shadow-2xl backdrop-blur-xl relative overflow-hidden text-center max-w-2xl mx-auto">
                <div class="absolute inset-0 bg-gradient-to-r from-primary-500/5 to-accent-500/5 pointer-events-none">
                </div>
                <label
                    class="block text-sm font-semibold tracking-wider text-dark-300 uppercase mb-3 text-center relative z-10">Give
                    your resume a title</label>
                <div class="relative z-10 w-full max-w-sm mx-auto">
                    <input type="text" name="title" value="My Resume" required
                        class="form-input text-lg text-center font-medium placeholder:font-normal placeholder:text-dark-500 bg-dark-900/50 border-dark-600/80 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/20 transition-all rounded-xl py-3 shadow-inner"
                        placeholder="e.g. Senior Software Engineer">
                </div>
            </div>

            <div class="w-full">
                <div class="flex flex-col md:flex-row justify-between items-end mb-5 gap-4">
                    <label class="block text-sm font-semibold tracking-wider text-dark-300 uppercase">Select
                        Template Style</label>
                    <div class="relative w-full md:w-80">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-dark-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                        <input type="text" id="templateSearch"
                            class="form-input block w-full pl-10 py-2 sm:text-sm border-dark-600/50 bg-dark-900/50 text-white rounded-xl focus:ring-primary-500 focus:border-primary-500 shadow-inner transition-all placeholder:text-dark-500"
                            placeholder="Search templates... (e.g. Modern, Medical)">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6" id="templateGrid">

                    <!-- Modern ATS -->
                    <label class="relative group cursor-pointer block h-full">
                        <input type="radio" name="template" value="modern_ats_clean" class="peer sr-only" checked>
                        <div
                            class="h-full border-2 border-dark-700/80 rounded-2xl overflow-hidden transition-all duration-300 peer-checked:border-primary-500 peer-checked:bg-primary-500/5 peer-checked:shadow-[0_0_25px_rgba(var(--color-primary-500),0.15)] hover:border-dark-500 bg-dark-800/60 flex flex-col hover:-translate-y-1">
                            <div
                                class="bg-dark-900/40 p-5 aspect-[1/1.414] overflow-hidden flex items-center justify-center border-b border-dark-700/50 relative group-hover:bg-dark-900/60 transition-colors">
                                <div
                                    class="w-full h-full bg-white rounded shadow-sm p-4 flex flex-col gap-2 transform origin-top group-hover:scale-[1.03] transition-transform duration-500">
                                    <div class="w-1/2 h-2.5 bg-[#000080] rounded mx-auto mb-1"></div>
                                    <div class="w-1/3 h-1.5 bg-slate-400 rounded mx-auto mb-0.5"></div>
                                    <div class="w-2/3 h-1 bg-slate-500 rounded mx-auto mb-2"></div>

                                    <div class="w-full">
                                        <div class="w-1/3 h-1.5 bg-[#000080] rounded mb-0.5"></div>
                                        <div class="w-full h-0.5 bg-[#000080] mb-1.5"></div>
                                        <div class="w-full h-1 bg-slate-300 rounded mb-0.5"></div>
                                        <div class="w-[90%] h-1 bg-slate-300 rounded mb-0.5"></div>
                                        <div class="w-3/4 h-1 bg-slate-300 rounded"></div>
                                    </div>

                                    <div class="w-full mt-1">
                                        <div class="w-1/4 h-1.5 bg-[#000080] rounded mb-0.5"></div>
                                        <div class="w-full h-0.5 bg-[#000080] mb-1.5"></div>
                                        <div class="flex justify-between mb-0.5">
                                            <div class="w-1/3 h-1.5 bg-slate-600 rounded"></div>
                                            <div class="w-1/4 h-1 bg-slate-400 rounded"></div>
                                        </div>
                                        <div class="flex gap-1.5 pl-2 mb-0.5">
                                            <div class="w-1 h-1 rounded-full bg-slate-400 shrink-0 self-center"></div>
                                            <div class="w-full h-1 bg-slate-300 rounded self-center"></div>
                                        </div>
                                        <div class="flex gap-1.5 pl-2 mb-0.5">
                                            <div class="w-1 h-1 rounded-full bg-slate-400 shrink-0 self-center"></div>
                                            <div class="w-[85%] h-1 bg-slate-300 rounded self-center"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="p-4 flex flex-col flex-grow relative z-10 border-t border-dark-700/50">

                                    class="absolute -top-3.5 right-4 w-7 h-7 rounded-full border-2 border-dark-600 bg-dark-800 flex items-center justify-center shrink-0 peer-checked:bg-primary-500 peer-checked:border-primary-500 transition-all shadow-md">

                                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                                <span class="text-white font-bold text-sm mb-1 mt-1">Modern ATS Cle<span
                                        class="opacity-0">a</span>n</span>
                                <p class="text-dark-400 text-xs leading-relaxed">Clean, highly legible layout perfect
                                    for automated resume scanners.</p>
                            </div>
                        </div>
                    </label>

                    <!-- Minimal Academic -->

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('templateSearch');
        const grid = document.getElementById('templateGrid');
        const cards = grid.querySelectorAll('label');

        searchInput.addEventListener('input', function (e) {
            const searchTerm = e.target.value.toLowerCase();

            cards.forEach(card => {
                const title = card.querySelector('span').textContent.toLowerCase();
                const desc = card.querySelector('p').textContent.toLowerCase();

                if (title.includes(searchTerm) || desc.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
</script>
