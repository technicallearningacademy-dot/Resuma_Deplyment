<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ResumeForge AI{% endblock %} | AI Resume Builder</title>

    <!-- SEO Meta -->
    <meta name="description"
        content="{% block meta_description %}Build ATS-optimized resumes with AI. Professional templates, LaTeX generation, instant PDF & DOCX export.{% endblock %}">
    <meta name="keywords" content="resume builder, ATS resume, AI resume, LaTeX resume, professional CV">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">

    <!-- OpenGraph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}ResumeForge AI — Smart Resume Builder{% endblock %}">
    <meta property="og:description" content="Build ATS-optimized resumes powered by AI. 5 professional templates.">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ResumeForge AI",
        "description": "AI-powered ATS Resume Builder",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web"
    }
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '375px',
                    },
                    colors: {
                        primary: { 50: 'var(--primary-50)', 100: 'var(--primary-100)', 200: 'var(--primary-200)', 300: 'var(--primary-300)', 400: 'var(--primary-400)', 500: 'var(--primary-500)', 600: 'var(--primary-600)', 700: 'var(--primary-700)', 800: 'var(--primary-800)', 900: 'var(--primary-900)', 950: 'var(--primary-950)' },
                        accent: { 50: 'var(--accent-50)', 100: 'var(--accent-100)', 200: 'var(--accent-200)', 300: 'var(--accent-300)', 400: 'var(--accent-400)', 500: 'var(--accent-500)', 600: 'var(--accent-600)', 700: 'var(--accent-700)', 800: 'var(--accent-800)', 900: 'var(--accent-900)' },
                        emerald: { 400: 'var(--emerald-400)', 500: 'var(--emerald-500)', 600: 'var(--emerald-600)' },
                        rose: { 400: 'var(--rose-400)', 500: 'var(--rose-500)', 600: 'var(--rose-600)' },
                        dark: { 50: 'var(--dark-50)', 100: 'var(--dark-100)', 200: 'var(--dark-200)', 300: 'var(--dark-300)', 400: 'var(--dark-400)', 500: 'var(--dark-500)', 600: 'var(--dark-600)', 700: 'var(--dark-700)', 800: 'var(--dark-800)', 900: 'var(--dark-900)', 950: 'var(--dark-950)' },
                    },
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- AOS CSS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Alpine.js for interactivity -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        * {
            font-family: 'Outfit', system-ui, sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        :root,
        [data-theme="theme-ocean"] {
            /* Ocean Mesh (Default) */
            --primary-50: #f0f1ff;
            --primary-100: #e0e1ff;
            --primary-200: #c1c4fe;
            --primary-300: #a2a6fd;
            --primary-400: #8389fc;
            --primary-500: #646cfb;
            --primary-600: #4f54e0;
            --primary-700: #3d42b5;
            --primary-800: #2d318a;
            --primary-900: #1e2160;
            --primary-950: #0f1030;
            --accent-50: #fff7ed;
            --accent-100: #ffedd5;
            --accent-200: #fed7aa;
            --accent-300: #fdba74;
            --accent-400: #fb923c;
            --accent-500: #f97316;
            --accent-600: #ea580c;
            --accent-700: #c2410c;
            --accent-800: #9a3412;
            --accent-900: #7c2d12;
            --emerald-400: #34d399;
            --emerald-500: #10b981;
            --emerald-600: #059669;
            --rose-400: #fb7185;
            --rose-500: #f43f5e;
            --rose-600: #e11d48;
            --dark-50: #f8fafc;
            --dark-100: #f1f5f9;
            --dark-200: #e2e8f0;
            --dark-300: #cbd5e1;
            --dark-400: #94a3b8;
            --dark-500: #64748b;
            --dark-600: #475569;
            --dark-700: #334155;
            --dark-800: #1e293b;
            --dark-900: #0f172a;
            --dark-950: #030712;

            --bg-grad-start: #030712;
            --bg-grad-mid1: #0c1222;
            --bg-grad-mid2: #111a35;
            --bg-grad-mid3: #0c1a30;
            --bg-grad-end: #030712;
            --mesh-glow-1: rgba(100, 108, 251, 0.08);
            --mesh-glow-2: rgba(249, 115, 22, 0.05);
            --mesh-glow-3: rgba(52, 211, 153, 0.03);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(100, 108, 251, 0.12);
        }

        [data-theme="theme-pink-3d"] {
            /* Pink Horizon */
            --primary-50: #fdf2f8;
            --primary-100: #fce7f3;
            --primary-200: #fbcfe8;
            --primary-300: #f9a8d4;
            --primary-400: #f472b6;
            --primary-500: #ec4899;
            --primary-600: #db2777;
            --primary-700: #be185d;
            --primary-800: #9d174d;
            --primary-900: #831843;
            --primary-950: #500724;
            --accent-50: #f5f3ff;
            --accent-100: #ede9fe;
            --accent-200: #ddd6fe;
            --accent-300: #c4b5fd;
            --accent-400: #a78bfa;
            --accent-500: #8b5cf6;
            --accent-600: #7c3aed;
            --accent-700: #6d28d9;
            --accent-800: #5b21b6;
            --accent-900: #4c1d95;
            --emerald-400: #38bdf8;
            --emerald-500: #0ea5e9;
            --emerald-600: #0284c7;
            --rose-400: #fbbf24;
            --rose-500: #f59e0b;
            --rose-600: #d97706;
            --dark-50: #fafaf9;
            --dark-100: #f5f5f4;
            --dark-200: #e7e5e4;
            --dark-300: #d6d3d1;
            --dark-400: #a8a29e;
            --dark-500: #78716c;
            --dark-600: #57534e;
            --dark-700: #44403c;
            --dark-800: #292524;
            --dark-900: #1c1917;
            --dark-950: #0c0a09;

            --bg-grad-start: #1c1917;
            --bg-grad-mid1: #2d1829;
            --bg-grad-mid2: #3d1b32;
            --bg-grad-mid3: #2a162b;
            --bg-grad-end: #1c1917;
            --mesh-glow-1: rgba(236, 72, 153, 0.1);
            --mesh-glow-2: rgba(139, 92, 246, 0.08);
            --mesh-glow-3: rgba(14, 165, 233, 0.05);
            --glass-bg: rgba(28, 25, 23, 0.65);
            --glass-border: rgba(236, 72, 153, 0.15);
        }

        [data-theme="theme-violet-3d"] {
            /* Deep Violet X */
            --primary-50: #f5f3ff;
            --primary-100: #ede9fe;
            --primary-200: #ddd6fe;
            --primary-300: #c4b5fd;
            --primary-400: #a78bfa;
            --primary-500: #8b5cf6;
            --primary-600: #7c3aed;
            --primary-700: #6d28d9;
            --primary-800: #5b21b6;
            --primary-900: #4c1d95;
            --primary-950: #2e1065;
            --accent-50: #ecfeff;
            --accent-100: #cffafe;
            --accent-200: #a5f3fc;
            --accent-300: #67e8f9;
            --accent-400: #22d3ee;
            --accent-500: #06b6d4;
            --accent-600: #0891b2;
            --accent-700: #0e7490;
            --accent-800: #155e75;
            --accent-900: #164e63;
            --emerald-400: #a7f3d0;
            --emerald-500: #34d399;
            --emerald-600: #059669;
            --rose-400: #fecdd3;
            --rose-500: #f43f5e;
            --rose-600: #e11d48;
            --dark-50: #f8fafc;
            --dark-100: #f1f5f9;
            --dark-200: #e2e8f0;
            --dark-300: #cbd5e1;
            --dark-400: #94a3b8;
            --dark-500: #64748b;
            --dark-600: #475569;
            --dark-700: #334155;
            --dark-800: #1e293b;
            --dark-900: #0f172a;
            --dark-950: #020617;

            --bg-grad-start: #020617;
            --bg-grad-mid1: #0f1025;
            --bg-grad-mid2: #1e1b4b;
            --bg-grad-mid3: #110f29;
            --bg-grad-end: #020617;
            --mesh-glow-1: rgba(139, 92, 246, 0.12);
            --mesh-glow-2: rgba(6, 182, 212, 0.08);
            --mesh-glow-3: rgba(52, 211, 153, 0.04);
            --glass-bg: rgba(2, 6, 23, 0.6);
            --glass-border: rgba(139, 92, 246, 0.15);
        }

        /* Premium gradient background — dynamic via CSS variables */
        .gradient-bg {
            background: linear-gradient(145deg, var(--bg-grad-start) 0%, var(--bg-grad-mid1) 25%, var(--bg-grad-mid2) 50%, var(--bg-grad-mid3) 75%, var(--bg-grad-end) 100%);
            min-height: 100vh;
        }

        /* Animated mesh gradient overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, var(--mesh-glow-1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, var(--mesh-glow-2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, var(--mesh-glow-3) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body>* {
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--glass-border);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.7);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--accent-400) 50%, var(--emerald-400) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-border {
            border-image: linear-gradient(135deg, var(--primary-500), var(--accent-400)) 1;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(100, 108, 251, 0.3);
            }

            50% {
                box-shadow: 0 0 50px rgba(100, 108, 251, 0.5), 0 0 80px rgba(249, 115, 22, 0.15);
            }
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-levitate {
            animation: float 4s ease-in-out infinite alternate;
        }

        .animate-glow-border {
            position: relative;
        }

        .animate-glow-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, var(--primary-500), var(--accent-500), var(--primary-500));
            background-size: 200% 100%;
            border-radius: inherit;
            z-index: -1;
            animation: shimmer 3s linear infinite;
        }

        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .animate-slide-up {
            animation: slide-up 0.6s ease-out forwards;
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }

        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(100, 108, 251, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        /* Custom scrollbar — matches theme */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #646cfb, #fb923c);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #8389fc, #fdba74);
        }

        /* Form inputs — soft glow */
        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(100, 108, 251, 0.15);
            border-radius: 0.625rem;
            color: #e2e8f0;
            font-size: 0.875rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--mesh-glow-1), 0 0 20px var(--mesh-glow-1);
            background: rgba(15, 23, 42, 0.95);
        }

        .form-input::placeholder {
            color: #475569;
        }

        /* Buttons — premium gradients with glow */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-700) 50%, var(--primary-400) 100%);
            background-size: 200% 200%;
            color: white;
            font-weight: 600;
            border-radius: 0.625rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px var(--mesh-glow-1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(100, 108, 251, 0.45);
            background-position: 100% 100%;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            background: var(--mesh-glow-1);
            color: var(--primary-200);
            font-weight: 500;
            border-radius: 0.625rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(100, 108, 251, 0.15);
            border-color: rgba(100, 108, 251, 0.4);
            color: #e0e1ff;
        }

        .btn-accent {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-500) 0%, var(--accent-400) 50%, var(--accent-300) 100%);
            background-size: 200% 200%;
            color: white;
            font-weight: 600;
            border-radius: 0.625rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px var(--mesh-glow-2);
        }

        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.4);
            background-position: 100% 100%;
        }

        .btn-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            font-weight: 500;
            border-radius: 0.625rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-size: 0.875rem;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.2);
        }

        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(244, 63, 94, 0.4);
        }

        /* Cards — premium glass effect */
        .card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(100, 108, 251, 0.1);
            border-radius: 0.875rem;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: rgba(100, 108, 251, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(100, 108, 251, 0.08);
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            padding: 0.875rem 1.5rem;
            border-radius: 0.625rem;
            color: white;
            font-weight: 500;
            font-size: 0.875rem;
            animation: slide-up 0.3s ease-out;
            max-width: 400px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .toast-success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9));
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }

        .toast-error {
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.9), rgba(225, 29, 72, 0.9));
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.3);
        }

        .toast-info {
            background: linear-gradient(135deg, rgba(100, 108, 251, 0.9), rgba(79, 84, 224, 0.9));
            box-shadow: 0 8px 25px rgba(100, 108, 251, 0.3);
        }

        /* Selection color */
        ::selection {
            background: rgba(100, 108, 251, 0.3);
            color: white;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body data-theme="{{ app_theme|default:'theme-ocean' }}" class="gradient-bg min-h-screen text-dark-200">

    {% if messages %}
    <div id="toast-container">
        {% for message in messages %}
        <div class="toast toast-{{ message.tags }}" onclick="this.remove()">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.5s';
                setTimeout(() => t.remove(), 500);
            });
        }, 4000);
    </script>
    {% endif %}

    {% block content %}{% endblock %}

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Vanilla Tilt Script for 3D Cards -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Scroll Animations
            AOS.init({
                duration: 800,
                easing: 'ease-out-cubic',
                once: true,
                offset: 50,
            });

            // Initialize 3D Tilt on Cards
            const tiltElements = document.querySelectorAll(".tilt-card");
            if (tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch (e) { console.warn('VanillaTilt not loaded', e); }
            }
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
