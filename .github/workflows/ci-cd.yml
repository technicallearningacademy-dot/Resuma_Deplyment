name: CI/CD Pipeline — ResumeForge AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Lint & Code Quality
  # ──────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: pip install flake8 isort

      - name: Run flake8 (syntax & style)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run flake8 (warnings)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check import ordering
        run: isort . --check-only --diff --profile django

  # ──────────────────────────────────────────────────
  # Job 2: Test
  # ──────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      SECRET_KEY: "test-secret-key-for-ci-only"
      DEBUG: "True"
      DATABASE_URL: "sqlite:///db.sqlite3"
      GEMINI_API_KEY: "test-key"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check --deploy 2>&1 || true

      - name: Run migrations check
        run: python manage.py migrate --run-syncdb --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2 --no-input

  # ──────────────────────────────────────────────────
  # Job 3: Security Scan
  # ──────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check for known vulnerabilities
        run: pip-audit -r requirements.txt || true

      - name: Scan for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.env\.example' --exclude-files '\.git/.*' || true

  # ──────────────────────────────────────────────────
  # Job 4: Build Verification
  # ──────────────────────────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [test, security]
    env:
      SECRET_KEY: "build-verification-key"
      DEBUG: "False"
      DATABASE_URL: "sqlite:///db.sqlite3"
      GEMINI_API_KEY: "build-key"
      ALLOWED_HOSTS: "*"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files (production mode)
        run: python manage.py collectstatic --noinput

      - name: Verify Gunicorn can start
        run: |
          timeout 5 gunicorn core.wsgi --bind 0.0.0.0:8000 --workers 1 --timeout 5 || true
          echo "✅ Gunicorn build verification passed"

      - name: Build summary
        run: |
          echo "========================================"
          echo "  ✅ BUILD VERIFICATION PASSED"
          echo "  📦 Python: ${{ env.PYTHON_VERSION }}"
          echo "  🔧 Django: $(python -c 'import django; print(django.get_version())')"
          echo "  📁 Static files collected"
          echo "  🚀 Ready for Railway deployment"
          echo "========================================"

  # ──────────────────────────────────────────────────
  # Job 5: Deploy to Railway (auto on main push)
  # ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.RAILWAY_PUBLIC_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Deployment notification
        run: |
          echo "========================================"
          echo "  🚀 DEPLOYED TO RAILWAY"
          echo "  📅 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  🔀 Commit: ${{ github.sha }}"
          echo "  👤 By: ${{ github.actor }}"
          echo "========================================"
